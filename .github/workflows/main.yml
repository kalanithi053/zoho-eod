name: Daily Cron Job

on:
  schedule:
    - cron: '20 9 * * *'  # 9:00 AM IST (UTC+5:30)

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call API
        run: |
          curl -X GET \
            'https://api-dev-zoho-eod.vercel.app/api/v1/track/sheet-to-report' \
            -H 'accept: */*'
